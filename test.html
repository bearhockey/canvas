<html>
<head>
<style>
button
{
  border-radius: 10px;
  height: 64px;
  margin: 4px;
  width: 64px;
}
canvas
{
  border:1px solid #CCCCCC;
  background-color: #333333;
  padding: 0px;
  margin-left: auto;
  margin-right: auto;
  display: block;
}
div
{
  display: block;
  float: left;
  padding: 2px 4px;
  text-align: center;
}
</style>
</head>
<body onload="startGame()">
<script src="camera.js"></script>
<script src="grid.js"></script>
<script src="level.js"></script>
<script src="player.js"></script>
<script src="main.js"></script>
<script type="text/javascript">
  function MoveUp()    { myPlayer.MoveNorth(); myGameArea.Update(); }
  function MoveDown()  { myPlayer.MoveSouth(); myGameArea.Update(); }
  function MoveRight() { myPlayer.MoveEast();  myGameArea.Update(); }
  function MoveLeft()  { myPlayer.MoveWest();  myGameArea.Update(); }
</script>
<div id="divCanvas"></div>
<div id="divController" style="width:auto;">
  <button onclick="MoveUp()">UP</button>
  <br>
  <button onclick="MoveLeft()">LEFT</button>
  <button onclick="MoveRight()">RIGHT</button>
  <br>
  <button onclick="MoveDown()">DOWN</button>
</div>

</body>
</html>
