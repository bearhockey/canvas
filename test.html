<html>
<head>
<style>
button
{
  border-radius: 10px;
  height: 64px;
  margin: 4px;
  width: 64px;
}
canvas
{
  border:1px solid #CCCCCC;
  background-color: #333333;
  padding: 0px;
  margin-left: auto;
  margin-right: auto;
  display: block;
}
div
{
  display: block;
  float: left;
  padding: 2px 4px;
  text-align: center;
  width: auto;
}
</style>
</head>
<body onload="startGame()">
<script src="./src/direction_const.js"></script>
<script stc="./src/xml_loader.js"></script>
<script src="./src/camera.js"></script>
<script src="./src/grid.js"></script>
<script src="./src/level.js"></script>
<script src="./src/player.js"></script>
<script src="./src/main.js"></script>
<script type="text/javascript">
  function MoveUp()    { myPlayer.Move(DIRECTION.NORTH); myGameArea.Update(); }
  function MoveDown()  { myPlayer.Move(DIRECTION.SOUTH); myGameArea.Update(); }
  function MoveRight() { myPlayer.Move(DIRECTION.EAST);  myGameArea.Update(); }
  function MoveLeft()  { myPlayer.Move(DIRECTION.WEST);  myGameArea.Update(); }

  function ZoomOut() { GRID.Zoom(GRID.iFactor+1); myGameArea.Update(); }
  function ZoomIn()  { GRID.Zoom(GRID.iFactor-1); myGameArea.Update(); }

  function ShowGrid() { GRID.bShow = true; myGameArea.Draw(); }
</script>
<div id="divCanvas"></div>
<div id="divRight">
  <div id="divInfo">
    <p id="txtLocation">Location</p>
    <hr>
  </div>
  <br><br>
  <div id="divController" style="width:auto;">
    <button onclick="MoveUp()">UP</button>
    <br>
    <button onclick="MoveLeft()">LEFT</button>
    <button onclick="MoveRight()">RIGHT</button>
    <br>
    <button onclick="MoveDown()">DOWN</button>
    <hr>
    <button onclick="ZoomOut()">ZOOM (-)</button>
    <button onclick="ZoomIn()">ZOOM (+)</button>
    <br>
    <button onclick="ShowGrid()">SHOW GRID</button>
  </div>
</div>

</body>
</html>
