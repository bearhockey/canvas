<html>
<head>
<link rel="stylesheet" href="./css/style.css">
<link rel="stylesheet" href="./css/ui.css">
</head>
<body onload="StartGame()">
<script src="./src/util/combat.js"></script>
<script src="./src/util/const.js"></script>
<script src="./src/util/debug.js"></script>
<script src="./src/util/pawnutils.js"></script>
<script src="./src/util/rect.js"></script>
<script src="./src/util/strings.js"></script>
<script src="./src/util/utils.js"></script>

<script src="./src/ui/infobox.js"></script>
<script src="./src/ui/messagebox.js"></script>

<script src="./src/input/controller.js"></script>
<script src="./src/input/mouse.js"></script>
<script src="./src/statblock.js"></script>

<script src="./data/data_enemy.js"></script>
<script src="./data/data_floor.js"></script>
<script src="./data/data_weapon.js"></script>

<script src="./src/tile.js"></script>
<script src="./src/floor.js"></script>

<script src="./src/npc.js"></script>
<script src="./src/pawn.js"></script>
<script src="./src/inventory_container.js"></script>

<script src="./src/state/state_manager.js"></script>
<script src="./src/state/store_manager.js"></script>
<script src="./src/state/renderer.js"></script>
<script src="./src/state/inventory.js"></script>
<script src="./src/state/character.js"></script>

<script src="./src/main.js"></script>

<script type="text/javascript">
  function MoveNorthWest() { CONTROLLER.MoveHero(CONST.NORTHWEST); }
  function MoveNorth()     { CONTROLLER.MoveHero(CONST.NORTH); }
  function MoveNorthEast() { CONTROLLER.MoveHero(CONST.NORTHEAST); }
  function MoveSouthWest() { CONTROLLER.MoveHero(CONST.SOUTHWEST); }
  function MoveSouth()     { CONTROLLER.MoveHero(CONST.SOUTH); }
  function MoveSouthEast() { CONTROLLER.MoveHero(CONST.SOUTHEAST); }
  function MoveEast()      { CONTROLLER.MoveHero(CONST.EAST); }
  function MoveWest()      { CONTROLLER.MoveHero(CONST.WEST); }
  function Get()           { CONTROLLER.HeroPickup(); }
  function Action()        { CONTROLLER.HeroAction(); }

  function StageButton()     { STATE.SetState(STATE.STATE_STAGE); }
  function InventoryButton() { STATE.SetState(STATE.STATE_INVENTORY); }
  function CharacterButton() { STATE.SetState(STATE.STATE_CHARACTER); }
</script>

<div id="divMain">
  <div id="divTopButtons">
    <button id="butStage"     class="topButton" onclick="StageButton()">Stage</button>
    <button id="butInventory" class="topButton" onclick="InventoryButton()">Inventory</button>
    <button id="butCharacter" class="topButton" onclick="CharacterButton()">Character</button>
  </div>
  <div id="divCenter">
    <div id="divCanvas"></div>
    <div id="divText" class="text_area"></div>
  </div>
  <div id="divBottom">
    <div id="divInfo">
      <table class="infoPanel">
        <tr><td>Level</td><td id="playerLevel"></td></tr>
        <tr><td>HP</td><td id="playerHealth"></td></tr>
        <tr><td>MP</td><td id="playerMana"></td></tr>
        <tr><td>Time</td><td id="playerTime"></td></tr>
      </table>
    </div>
    <div id="divButtons">
      <button class="ui" id="button_pickup" onclick="Get()"></button>
      <button class="ui" id="button_stairs" onclick="Action()"></button>
      <br>
      <button class="ui" id="button_upleft" onclick="MoveNorthWest()"></button>
      <button class="ui" id="button_up" onclick="MoveNorth()"></button>
      <button class="ui" id="button_upright" onclick="MoveNorthEast()"></button>
      <br>
      <button class="ui" id="button_left" onclick="MoveWest()"></button>
      <button class="ui" id="button_what" onclick="Get()"></button>
      <button class="ui" id="button_right" onclick="MoveEast()"></button>
      <br>
      <button class="ui" id="button_downleft" onclick="MoveSouthWest()"></button>
      <button class="ui" id="button_down" onclick="MoveSouth()"></button>
      <button class="ui" id="button_downright" onclick="MoveSouthEast()"></button>
      <br>
      <button class="ui" onclick="DEBUG.DebugGetIdx()">IDX</button>
    </div>
  </div>
</div>

</body>
</html>
