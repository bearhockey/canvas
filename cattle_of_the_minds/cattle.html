<html>
<head>
<link rel="stylesheet" href="./css/style.css">
<link rel="stylesheet" href="./css/ui.css">
</head>
<body onload="StartGame()">
<script src="./src/util/const.js"></script>
<script src="./src/util/rect.js"></script>
<script src="./src/util/strings.js"></script>
<script src="./src/util/utils.js"></script>

<script src="./src/controller.js"></script>
<script src="./src/mouse.js"></script>
<script src="./src/statblock.js"></script>

<script src="./src/tile.js"></script>
<script src="./src/floor.js"></script>

<script src="./src/pawn.js"></script>
<script src="./src/inventory_container.js"></script>

<script src="./src/state/renderer.js"></script>
<script src="./src/state/inventory.js"></script>
<script src="./src/state/character.js"></script>

<script src="./src/main.js"></script>

<script type="text/javascript">
  function MoveNorth() { GoUp(); }
  function MoveSouth() { GoDown(); }
  function MoveEast()  { GoRight(); }
  function MoveWest()  { GoLeft(); }
  function Get()       { Pickup(); }

  function StageButton()     { SetState(CONST.STATE_STAGE); }
  function InventoryButton() { SetState(CONST.STATE_INVENTORY); }
  function CharacterButton() { SetState(CONST.STATE_CHARACTER); }
</script>

<div id="divMain">
  <div id="topButtons">
    <button id="butStage"     class="topButton" onclick="StageButton()">Stage</button>
    <button id="butInventory" class="topButton" onclick="InventoryButton()">Inventory</button>
    <button id="butCharacter" class="topButton" onclick="CharacterButton()">Character</button>
  </div>
  <div id="divCanvas"></div>
  <div id="divBottom">
    <div id="divInfo">
      <table class="infoPanel">
        <tr><td>Level</td><td id="playerLevel"></td></tr>
        <tr><td>HP</td><td id="playerHealth"></td></tr>
        <tr><td>MP</td><td id="playerMana"></td></tr>
        <tr><td>Time</td><td id="playerTime"></td></tr>
      </table>
    </div>
    <div id="divText" class="text_area"></div>
    <div id="divButtons">
      <button class="arrow" onclick="Get()">G</button>
      <button class="arrow" onclick="MoveNorth()">^</button>
      <button class="arrow" onclick="">x</button>
      <br>
      <button class="arrow" onclick="MoveWest()"><</button>
      <button class="arrow" onclick="MoveSouth()">v</button>
      <button class="arrow" onclick="MoveEast()">></button>
    </div>
  </div>
</div>

</body>
</html>
